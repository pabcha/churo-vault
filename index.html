<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Churo Vault</title>
  <meta name="description" content="Mis prompts de batalla para IA. Listos para copiar y pegar.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <h1 class="brand">Churo Vault</h1>
    </div>
  </header>

  <main class="page">
    <section class="status" id="status" aria-live="polite">Preparando tus prompts...</section>
    <section class="grid" id="grid" aria-live="polite"></section>
    <noscript>
      <div class="noscript">Necesitas activar JavaScript para ver y copiar tus prompts.</div>
    </noscript>
  </main>

  <dialog class="prompt-dialog" id="prompt-dialog" aria-labelledby="prompt-dialog-title">
    <article class="prompt-dialog__panel">
      <header class="prompt-dialog__header">
        <h2 class="prompt-dialog__title" id="prompt-dialog-title">Detalle del prompt</h2>
        <button class="prompt-dialog__close" id="prompt-dialog-close" type="button" aria-label="Cerrar detalle">×</button>
      </header>
      <section class="prompt-dialog__content" id="prompt-dialog-content"></section>
      <div class="prompt-dialog__actions">
        <button class="button" id="prompt-dialog-copy" type="button" aria-label="Copiar prompt completo">Copiar</button>
      </div>
    </article>
  </dialog>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="script.js" defer></script>
</body>
</html>
