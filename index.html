<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Churo Vault</title>
  <meta name="description" content="Colección personal de prompts con copia rápida al portapapeles.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <h1 class="brand">Churo Vault</h1>
    </div>
  </header>

  <main class="page">
    <section class="status" id="status" aria-live="polite">Cargando prompts...</section>
    <section class="grid" id="grid" aria-live="polite"></section>
    <noscript>
      <div class="noscript">Esta página requiere JavaScript para cargar y copiar los prompts.</div>
    </noscript>
  </main>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="script.js" defer></script>
</body>
</html>
